name: single_codeagent_workbench_calendar
description: Single CodeAgent for WorkBench calendar tasks
backend: smolagents
agents:
  worker:
    id: worker
    role: worker
    agent_type: CodeAgent
    model_id: bedrock:qwen.qwen3-235b-a22b-2507-v1:0
    prompt: worker
    tools:
    - workbench_calendar
    max_tokens: 8192
    temperature: 0.7
    device: null
topology:
  reports_to: {}
execution:
  parallel_workers: false
  timeout: 900
  max_retries: 0
